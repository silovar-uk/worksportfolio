name: Bootstrap portfolio files

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild portfolio package
        shell: bash
        run: |
          cat .bootstrap/part-*.b64 > site.b64
          base64 --decode site.b64 > site.zip
          unzip -o site.zip
          rm -f site.b64 site.zip
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap.yml
      - name: Commit published site
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish works portfolio"
          git push
