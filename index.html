<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="日常の小さな不便から生まれたツールと、その時に考えていたことを残す制作日記。">
  <meta name="theme-color" content="#f4f1e8">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="manifest" href="site.webmanifest">
  <title>つくって考えた｜制作日記</title>
  <style>
    :root{color-scheme:light;--bg:#f4f1e8;--paper:#fffdf7;--ink:#202426;--red:#e6402c;--yellow:#f3b62b;--muted:#6b6f70}
    *{box-sizing:border-box}body{margin:0;min-height:100svh;background:var(--bg);color:var(--ink);font-family:"Noto Sans JP","Yu Gothic",system-ui,sans-serif;display:grid;place-items:center;padding:24px}.loader{width:min(620px,100%);background:var(--paper);border:1px solid var(--ink);padding:clamp(24px,6vw,52px);box-shadow:10px 10px 0 var(--yellow)}.icon{width:88px;height:88px;display:block;margin-bottom:24px}.eyebrow{font-size:12px;font-weight:800;letter-spacing:.12em;color:var(--red)}h1{font-size:clamp(2rem,8vw,4rem);line-height:1.05;margin:.25em 0}.status{color:var(--muted);line-height:1.8}.bar{height:8px;background:#ded9ca;margin-top:24px;overflow:hidden}.bar::after{content:"";display:block;height:100%;width:42%;background:var(--red);animation:move 1.2s ease-in-out infinite alternate}@keyframes move{to{transform:translateX(138%)}}button{font:inherit;border:1px solid var(--ink);background:transparent;padding:.7em 1em;cursor:pointer}button:hover{background:var(--ink);color:#fff}.error{color:#9b1c1c}@media(prefers-reduced-motion:reduce){.bar::after{animation:none;width:70%}}
  </style>
</head>
<body>
  <main class="loader">
    <img class="icon" src="assets/favicon.svg" alt="">
    <p class="eyebrow">BUILDING THE SHELF</p>
    <h1>道具を、<br>棚に並べています。</h1>
    <p class="status" id="status">制作日記を読み込んでいます。</p>
    <div class="bar" aria-hidden="true"></div>
    <p id="retry" hidden><button type="button" onclick="location.reload()">もう一度組み立てる</button></p>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
  (()=>{
    'use strict';
    const status=document.getElementById('status');
    const retry=document.getElementById('retry');
    const base=new URL('.bootstrap/',location.href);
    const parts=Array.from({length:7},(_,i)=>new URL(`part-${String(i).padStart(2,'0')}.b64`,base));

    const extras=[
      {
        id:'lineworks-scroll-copy',title:'LINE WORKS Scroll & Copy',subtitle:'トーク履歴のさかのぼり・抽出拡張',
        summary:'LINE WORKSのトークを上へさかのぼり、発言者・日時・本文を分けてJSON、TSV、CSV、Markdown、Textへ保存するChrome拡張。',
        friction:'長いトーク履歴を必要なところまで手でスクロールし、あとから文章を整理し直す作業が重かった。',
        firstBuild:'まずは高速で上へさかのぼるScroll Only版を作り、途中停止後のコピーと構造化保存へ広げた。',
        currentAnswer:'スクロール、収集、形式変換を一つにまとめ、途中で止めても成果を持ち帰れる道具。',
        type:'chrome-extension',verbs:['記録する','整理する','共有する'],status:'active',visibility:'private',featured:false,
        createdAt:'2026-05-01',createdAtPrecision:'day',releasedAt:'2026-05-01',updatedAt:'2026-05-01',liveUrl:'',repositoryUrl:'',thumbnail:'',
        technologies:['Chrome Extension','JavaScript','Manifest V3'],documentationState:'verified',
        documentationNote:'会話内でv0.2.0〜v0.4.3のZIPを制作。Scroll Only／Chat Collectorの試作を統合。',
        relatedProjects:[{id:'x-local-post-exporter',relation:'表示済みの情報をローカル保存する'},{id:'converter',relation:'取得後のテキストを整える'}],
        map:{group:'extension',x:1320,y:398},extension:{version:'0.4.3',serviceWorker:'active'},
        updates:[
          {date:'2026-05-01',version:'0.4.3',change:'スクロール後の内容をJSON、TSV、CSV、Markdown、Textから選んで保存できる形へ整理した。',reason:'途中停止時にも、それまで取得した内容を確実に持ち帰るため。'},
          {date:'2026-05-01',version:'0.3.1',change:'抽出を行わない高速スクロール専用版を分けた。',reason:'まず履歴をさかのぼるだけの安全な用途も必要だったため。'}
        ],aside:'まず上へ行きたい日と、全部持って帰りたい日は、別の日だった。'
      },
      {
        id:'lineworks-logger',title:'LINE WORKS Logger',subtitle:'トーク・メールのローカル記録拡張',
        summary:'LINE WORKS上のトークやメールを端末内に記録し、JSON・CSVとして持ち出すためのChrome拡張。',
        friction:'大量の連絡を画面上だけで追うと、あとから検索・整理・振り返りがしにくかった。',
        firstBuild:'対象画面の情報を監視し、外部送信せずローカルへ蓄積する仕組みを作った。',
        currentAnswer:'業務連絡を外部サービスへ転送せず、自分で扱える記録データへ変える入口。',
        type:'chrome-extension',verbs:['記録する','探す','振り返る'],status:'prototype',visibility:'private',featured:false,
        createdAt:'2026-05',createdAtPrecision:'month',releasedAt:null,updatedAt:'2026-05',liveUrl:'',repositoryUrl:'',thumbnail:'',
        technologies:['Chrome Extension','JavaScript','Manifest V3'],documentationState:'verified',
        documentationNote:'LINE WORKSのトーク・メール監視、ローカル保存、JSON/CSV出力を行う拡張として制作。',
        relatedProjects:[{id:'lineworks-scroll-copy',relation:'LINE WORKSの情報をローカルへ残す'},{id:'zl-logger-web',relation:'記録をあとから扱える形にする'}],
        map:{group:'extension',x:1460,y:398},extension:{version:'試作版',serviceWorker:'active'},
        updates:[{date:'2026-05',version:'prototype',change:'トークとメールをローカル保存し、JSON・CSVで出力できる試作を作った。',reason:'外部転送を使わず、大量の連絡をあとから確認するため。'}],
        aside:'連絡は流れる。ログは流したくない。'
      },
      {
        id:'x-auto-screenshot-scroll',title:'X 自動スクリーンショット＆スクロール',subtitle:'タイムライン連続撮影拡張',
        summary:'Xの画面を自動でスクロールしながら連続撮影し、長いタイムラインをまとめて保存するChrome拡張。',
        friction:'投稿を後で確認するために、一画面ずつスクロールしてスクリーンショットを撮る作業が終わらなかった。',
        firstBuild:'スクロールと撮影を交互に実行し、画像をまとめて扱えるChrome拡張にした。',
        currentAnswer:'データ抽出では残らない見た目ごと、タイムラインの状態を記録する道具。',
        type:'chrome-extension',verbs:['記録する','集める','振り返る'],status:'dormant',visibility:'private',featured:false,
        createdAt:'2025-06-02',createdAtPrecision:'day',releasedAt:'2025-06-02',updatedAt:'2025-06-02',liveUrl:'',repositoryUrl:'',thumbnail:'',
        technologies:['Chrome Extension','JavaScript','JSZip'],documentationState:'verified',
        documentationNote:'manifest.json、background.js、content.js、popup、JSZipを含む拡張として制作。',
        relatedProjects:[{id:'x-local-post-exporter',relation:'X上の情報を手元へ残す'},{id:'simple-screenshot-editor',relation:'撮影した画面を編集・書き出す'}],
        map:{group:'extension',x:1180,y:398},extension:{version:'1.0',serviceWorker:'active'},
        updates:[{date:'2025-06-02',version:'1.0',change:'Xの自動スクロールと連続スクリーンショットを一つの拡張へまとめた。',reason:'長いタイムラインを手作業で撮影する負担を減らすため。'}],
        aside:'スクロールを自動化したら、撮る枚数まで自動で増えた。'
      }
    ];

    const textBlobUrl=(text,type)=>URL.createObjectURL(new Blob([text],{type}));
    const patchData=(projects,periods,settings)=>{
      const map=new Map(projects.map(p=>[p.id,p]));
      extras.forEach(p=>map.set(p.id,p));
      const portfolio=map.get('build-diary');
      if(portfolio){
        portfolio.repositoryUrl='https://github.com/silovar-uk/worksportfolio';
        portfolio.liveUrl='https://silovar-uk.github.io/worksportfolio/';
        portfolio.liveUrlStatus='verified';
        portfolio.updatedAt='2026-07-19';
        portfolio.summary='作った道具を、年代・目的・つながりから読み直す制作日記ポートフォリオ。';
      }
      periods.forEach(period=>{
        if(period.id==='2026-05'){
          ['lineworks-scroll-copy','lineworks-logger'].forEach(id=>{if(!period.projectIds.includes(id))period.projectIds.push(id)});
          if(!period.interests.includes('LINE WORKS'))period.interests.push('LINE WORKS');
          period.summary='イベントや広報のページに加え、LINE WORKSの長い履歴を自分で扱える形へ変える拡張も作っていた。';
        }
        if(period.id==='2025-06'){
          if(!period.projectIds.includes('x-auto-screenshot-scroll'))period.projectIds.push('x-auto-screenshot-scroll');
          if(!period.interests.includes('Chrome拡張'))period.interests.push('Chrome拡張');
          period.summary='小さな変換ツールに加え、Xを自動スクロールしながら画面ごと記録する拡張も試していた。';
        }
      });
      return {projects:[...map.values()],periods,settings};
    };

    Promise.all(parts.map(async(url,index)=>{
      status.textContent=`制作日記を組み立てています（${index+1} / ${parts.length}）`;
      const response=await fetch(url,{cache:'force-cache'});
      if(!response.ok)throw new Error(`データの取得に失敗しました: ${response.status}`);
      return response.text();
    }))
    .then(chunks=>JSZip.loadAsync(chunks.join(''),{base64:true}))
    .then(async zip=>{
      const [html,css,app,projectsText,periodsText,settingsText]=await Promise.all([
        zip.file('index.html').async('string'),zip.file('css/styles.css').async('string'),zip.file('js/app.js').async('string'),
        zip.file('data/projects.json').async('string'),zip.file('data/periods.json').async('string'),zip.file('data/settings.json').async('string')
      ]);
      const data=patchData(JSON.parse(projectsText),JSON.parse(periodsText),JSON.parse(settingsText));
      const inline=`window.BUILD_DIARY_DATA = ${JSON.stringify(data)};`;
      const patchedCss=css.replace(
        '.brand-mark { display: grid; place-items: center; width: 34px; height: 34px; border: 1px solid var(--ink); font: 800 .8rem "Roboto Mono", monospace; transform: rotate(-3deg); background: var(--paper); }',
        '.brand-mark { display:block; width:38px; height:38px; object-fit:contain; flex:0 0 auto; }'
      );
      let patchedHtml=html
        .replace('<span class="brand-mark" aria-hidden="true">d/</span>','<img class="brand-mark" src="assets/favicon.svg" alt="" width="38" height="38">')
        .replace('61のリポジトリも、','GitHubと手元の拡張も、')
        .replace('GitHub上の61リポジトリと、自作したChrome拡張を統合しています。','GitHub上のリポジトリに加え、ZIPで制作した拡張や、公開リポジトリを持たない手元の道具も統合しています。')
        .replace(
          '<select data-verb-filter aria-label="目的で絞り込む">\n          <option value="">すべての目的</option>\n        </select>\n        <button type="button" class="subtle-button" data-clear-filter>全部出す</button>',
          '<select data-verb-filter aria-label="目的で絞り込む">\n          <option value="">すべての目的</option>\n        </select>\n        <select data-type-filter aria-label="種類で絞り込む">\n          <option value="">すべての種類</option>\n        </select>\n        <select data-documentation-filter aria-label="整理状態で絞り込む">\n          <option value="">すべての整理状態</option>\n        </select>\n        <button type="button" class="subtle-button" data-clear-filter>全部出す</button>'
        );
      const cssUrl=textBlobUrl(patchedCss,'text/css');
      const inlineUrl=textBlobUrl(inline,'text/javascript');
      const appUrl=textBlobUrl(app,'text/javascript');
      patchedHtml=patchedHtml
        .replace('href="css/styles.css"',`href="${cssUrl}"`)
        .replace('src="data/inline-data.js"',`src="${inlineUrl}"`)
        .replace('src="js/app.js"',`src="${appUrl}"`)
        .replace('href="assets/icons/favicon.ico" sizes="any"','href="assets/favicon.svg" type="image/svg+xml"')
        .replace('href="./" aria-label="つくって考えた トップへ"','href="#" aria-label="つくって考えた トップへ"');
      document.open();document.write(patchedHtml);document.close();
    })
    .catch(error=>{
      console.error(error);status.classList.add('error');
      status.textContent='制作日記を組み立てられませんでした。通信状態を確認して、もう一度お試しください。';retry.hidden=false;
    });
  })();
  </script>
</body>
</html>
