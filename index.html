<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="日常の小さな不便から生まれたツールと、その時に考えていたことを残す制作日記。">
  <meta name="theme-color" content="#f4f1e8">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="manifest" href="site.webmanifest">
  <title>つくって考えた｜制作日記</title>
  <style>
    :root{--bg:#f4f1e8;--paper:#fffdf7;--ink:#202426;--red:#e6402c;--yellow:#f3b62b;--muted:#6b6f70}
    *{box-sizing:border-box}body{margin:0;min-height:100svh;background:var(--bg);color:var(--ink);font-family:"Noto Sans JP","Yu Gothic",system-ui,sans-serif;display:grid;place-items:center;padding:24px}main{width:min(620px,100%);background:var(--paper);border:1px solid var(--ink);padding:clamp(24px,6vw,52px);box-shadow:10px 10px 0 var(--yellow)}img{width:88px;height:88px}.eyebrow{font-size:12px;font-weight:800;letter-spacing:.12em;color:var(--red)}h1{font-size:clamp(2rem,8vw,4rem);line-height:1.05}p{color:var(--muted);line-height:1.8}button{font:inherit;border:1px solid var(--ink);background:transparent;padding:.7em 1em;cursor:pointer}.error{color:#9b1c1c}
  </style>
</head>
<body>
  <main>
    <img src="assets/favicon.svg" alt="">
    <p class="eyebrow">BUILDING THE SHELF</p>
    <h1>道具を、<br>棚に並べています。</h1>
    <p id="status">制作日記を読み込んでいます。</p>
    <p id="retry" hidden><button type="button" onclick="location.reload()">もう一度組み立てる</button></p>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="loader.js"></script>
</body>
</html>
